# ================================================
# IoT Gateway System 配置文件
# ================================================

# 网络配置
# TCP服务端口（用于与上位云平台通信）
tcp_port = 8080

# UDP服务端口（用于接收STM32传感器数据）
udp_port = 9527

# 日志配置
# 日志级别：DEBUG, INFO, WARN, ERROR, FATAL
log_level = INFO

# 日志存储路径
log_path = ./log

# 线程池配置
# 线程池大小（用于处理业务逻辑）
thread_pool_size = 10

# 进程池配置
# 进程池大小（用于执行插件或隔离任务）
process_pool_size = 3

# 流量控制配置
# 令牌桶速率（每秒产生的令牌数）
token_cps = 100

# 令牌桶容量（最大令牌数）
token_burst = 200

# 认证配置
# 访问令牌（用于TCP客户端认证）
auth_token = iot_gateway_2024

# 云平台配置
# 云平台服务器地址
cloud_server = 119.29.98.16

# 设备编号（cloud_port实际是设备编号，用于HTTP API路径）
# 例如：POST /api/1.0/device/5924/datas
cloud_port = 89

# API密钥（用于云平台认证）
# 注意：这里填写你从云平台获取的API密钥（保留冒号）
api_key = eyJhbGciOiJIUzI1NiIsImV4cCI6MjA5MTU5Njg5MCwiaWF0IjoxNzc2MjM2ODkwfQ.eyJpZCI6NTgwN30.C-jgBkB6GhwnlXNnM3mQBrLXJQa_MFNSBUoCskjhbJI:
# ================================================
# 配置说明：
# 1. 所有配置项格式为：key = value
# 2. 以 # 开头的行为注释
# 3. 修改配置后需要重启服务才能生效
# 4. 端口号建议使用1024以上的端口
# 5. 确保云平台配置正确，否则数据无法上传
